# Reference CI to produce the working APK — adapts around "no Android SDK
# in the dev sandbox" by installing the SDK in the runner.
#
# Place in eli-companion-android at .github/workflows/build-apk.yml
# Produces app-debug.apk (unsigned) and, if a keystore secret is set,
# app-release.apk (signed) as build artifacts.

name: build-apk

on:
  push:
    branches: [ main, "claude/**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        # Installs cmdline-tools + accepts licenses; AGP fetches platform-34
        # and build-tools on first Gradle run.

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Unit tests (Robolectric)
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Decode release keystore (optional)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks
          cat > keystore.properties <<EOF
          storeFile=release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Assemble release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: elli-apk
          path: app/build/outputs/apk/**/*.apk
